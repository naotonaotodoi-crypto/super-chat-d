<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Chat D</title>
  <meta name="description" content="シンプルでおしゃれなメッセージアプリ" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0ede8;
      --text2: #8a8680;
      --text3: #5a5754;
      --accent: #c8a97e;
      --accent2: #a07850;
      --accent-bg: rgba(200,169,126,0.1);
      --online: #4ade80;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body { height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }

    /* ── Auth Screen ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 32px;
    }
    .auth-logo { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
    .auth-logo span { color: var(--accent); }
    .auth-card {
      background: var(--bg2); border: 0.5px solid var(--border2);
      border-radius: var(--radius); padding: 32px; width: 340px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .auth-card h2 { font-size: 17px; font-weight: 500; }
    .auth-card p { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .auth-input {
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 11px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius-sm);
      padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #d4b88e; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: transparent; color: var(--text2); border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm); padding: 11px; font-size: 14px; cursor: pointer;
      font-family: inherit; transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
    .auth-divider { display: flex; align-items: center; gap: 10px; }
    .auth-divider span { font-size: 12px; color: var(--text3); }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; height:0.5px; background: var(--border); }
    .auth-error { font-size: 12px; color: #f87171; display: none; }

    /* ── App Layout ── */
    #app { display: none; height: 100vh; flex-direction: row; }
    #app.visible { display: flex; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px; flex-shrink: 0; background: var(--bg2);
      border-right: 0.5px solid var(--border); display: flex; flex-direction: column;
    }
    .sidebar-top {
      padding: 18px 16px 12px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 0.5px solid var(--border);
    }
    .sidebar-top .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .sidebar-top .logo span { color: var(--accent); }
    .icon-btn {
      background: none; border: none; color: var(--text2); cursor: pointer;
      width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; transition: background 0.12s, color 0.12s;
    }
    .icon-btn:hover { background: var(--bg3); color: var(--text); }
    .sidebar-search {
      margin: 10px 12px; background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-search svg { color: var(--text3); flex-shrink: 0; }
    .sidebar-search input {
      background: none; border: none; font-size: 13px; color: var(--text); outline: none; flex: 1; font-family: inherit;
    }
    .sidebar-search input::placeholder { color: var(--text3); }
    .section-label { padding: 8px 16px 4px; font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
    .chat-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .chat-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      cursor: pointer; transition: background 0.12s; border-radius: var(--radius-sm); margin: 0 6px 1px;
    }
    .chat-item:hover { background: var(--bg3); }
    .chat-item.active { background: var(--accent-bg); }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; position: relative;
    }
    .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .online-dot {
      position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px;
      background: var(--online); border-radius: 50%; border: 1.5px solid var(--bg2);
    }
    .chat-meta { flex: 1; min-width: 0; }
    .chat-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .chat-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .unread-badge {
      background: var(--accent); color: #0f0f0f; font-size: 10px; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center;
      justify-content: center; padding: 0 5px; flex-shrink: 0;
    }
    .sidebar-footer {
      padding: 12px 16px; border-top: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .me-name { flex: 1; font-size: 13px; font-weight: 500; }
    .me-status { font-size: 11px; color: var(--text2); }

    /* ── Main chat ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header {
      padding: 14px 20px; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 15px; font-weight: 600; }
    .chat-header-status { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .header-actions { display: flex; gap: 4px; }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .day-divider {
      text-align: center; font-size: 11px; color: var(--text3);
      margin: 12px 0; position: relative;
    }
    .day-divider::before {
      content: ''; position: absolute; top: 50%; left: 0; right: 0;
      height: 0.5px; background: var(--border);
    }
    .day-divider span { background: var(--bg); padding: 0 12px; position: relative; }

    .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.self { flex-direction: row-reverse; }
    .msg-row.self .msg-avatar { display: none; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    .msg-avatar.spacer { visibility: hidden; }

    .msg-bubble {
      max-width: 65%; padding: 9px 13px; border-radius: 16px; font-size: 14px;min-width: 120px;
      line-height: 1.55; word-break: break-word;
    }
    .msg-bubble.other {
      background: var(--bg3); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.self {
      background: var(--accent); color: #0f0f0f;
      border-bottom-right-radius: 4px;
    }
    .msg-sender { font-size: 11px; color: var(--text3); margin-bottom: 3px; padding-left: 36px; }
    .msg-time-row { display: flex; font-size: 11px; color: var(--text3); padding: 2px 4px 0; }
    .msg-row.self .msg-time-row { justify-content: flex-end; }

    .msg-img-bubble {
      max-width: 240px; border-radius: 14px; overflow: hidden;
      border: 0.5px solid var(--border); cursor: pointer;
    }
    .msg-img-bubble img { width: 100%; display: block; }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 14px; border-top: 0.5px solid var(--border);
      display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
    }
    .input-attach { display: flex; gap: 2px; flex-shrink: 0; }
    .input-wrap {
      flex: 1; background: var(--bg3); border: 0.5px solid var(--border2);
      border-radius: 22px; display: flex; align-items: flex-end; padding: 8px 12px; gap: 8px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: none; border: none; font-size: 14px; color: var(--text);
      outline: none; resize: none; font-family: inherit; line-height: 1.5;
      max-height: 120px; overflow-y: auto;
    }
    #msg-input::placeholder { color: var(--text3); }
    .send-btn {
      background: var(--accent); border: none; color: #0f0f0f;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
    }
    .send-btn:hover { background: #d4b88e; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { background: var(--bg3); color: var(--text3); cursor: default; }

    /* ── New group modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 24px; width: 360px; display: flex; flex-direction: column; gap: 14px;
    }
    .modal h3 { font-size: 16px; font-weight: 600; }
    .modal-input {
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 10px 13px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; width: 100%;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .modal-actions .btn-cancel {
      background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 8px 16px; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .modal-actions .btn-create {
      background: var(--accent); border: none; border-radius: var(--radius-sm);
      padding: 8px 16px; color: #0f0f0f; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--text3);
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* ── File input hidden ── */
    #file-input { display: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
      padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 200;
      transition: transform 0.25s ease; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; transition: transform 0.25s; }
      .sidebar.hidden { transform: translateX(-100%); }
      .main { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-logo">Super Chat<span> D</span></div>
  <div class="auth-card" id="login-card">
    <h2>ログイン</h2>
    <p>メールアドレスとパスワードを入力してください</p>
    <input class="auth-input" id="login-email" type="email" placeholder="メールアドレス" />
    <input class="auth-input" id="login-password" type="password" placeholder="パスワード" />
    <span class="auth-error" id="login-error"></span>
    <button class="btn-primary" onclick="loginUser()">ログイン</button>
    <div class="auth-divider"><span>または</span></div>
    <button class="btn-secondary" onclick="showSignup()">新規アカウント作成</button>
  </div>
  <div class="auth-card" id="signup-card" style="display:none">
    <h2>アカウント作成</h2>
    <input class="auth-input" id="signup-name" type="text" placeholder="表示名" />
    <input class="auth-input" id="signup-email" type="email" placeholder="メールアドレス" />
    <input class="auth-input" id="signup-password" type="password" placeholder="パスワード（6文字以上）" />
    <span class="auth-error" id="signup-error"></span>
    <button class="btn-primary" onclick="signupUser()">作成する</button>
    <button class="btn-secondary" onclick="showLogin()">ログインに戻る</button>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="logo">Super Chat<span> D</span></div>
      <div style="display:flex;gap:4px">
        <button class="icon-btn" title="グループ作成" onclick="openGroupModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="icon-btn" title="ダイレクトメッセージ" onclick="openDMModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </button>
      </div>
    </div>
    <div class="sidebar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="検索…" id="search-input" oninput="filterChats(this.value)" />
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <div class="avatar" id="me-avatar" style="background:#3a2e1e;color:var(--accent);width:34px;height:34px;font-size:12px"></div>
      <div>
        <div class="me-name" id="me-name-label">—</div>
        <div class="me-status">オンライン</div>
      </div>
      <button class="icon-btn" title="ログアウト" onclick="logoutUser()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="main" id="main-area">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>チャットを選択してください</p>
    </div>
    <div id="chat-view" style="display:none;flex:1;display:none;flex-direction:column;min-height:0">
      <div class="chat-header">
        <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:13px"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name-header"></div>
          <div class="chat-header-status" id="chat-status-header"></div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="メンバー" onclick="showMembers()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </button>
        </div>
      </div>
      <div class="messages" id="messages-container"></div>
      <div class="input-area">
        <div class="input-attach">
          <button class="icon-btn" title="画像を送る" onclick="document.getElementById('file-input').click()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
        </div>
        <div class="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="メッセージを入力…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="sendImage(this)" />
    </div>
  </div>
</div>

<!-- ── Group Modal ── -->
<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3>グループを作成</h3>
    <input class="modal-input" id="group-name-input" placeholder="グループ名" />
    <input class="modal-input" id="group-emails-input" placeholder="メンバーのメールアドレス（カンマ区切り）" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeGroupModal()">キャンセル</button>
      <button class="btn-create" onclick="createGroup()">作成</button>
    </div>
  </div>
</div>

<!-- ── DM Modal ── -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <h3>ダイレクトメッセージ</h3>
    <p style="font-size:13px;color:var(--text2)">相手のメールアドレスを入力してください</p>
    <input class="modal-input" id="dm-email-input" placeholder="メールアドレス" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDMModal()">キャンセル</button>
      <button class="btn-create" onclick="openDM()">開く</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signOut, onAuthStateChanged, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
           addDoc, onSnapshot, query, orderBy, serverTimestamp,
           updateDoc, arrayUnion, where, limit }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ── Firebase Config (あとで自分のものに差し替え) ──
  const firebaseConfig = {
    apiKey: "AIzaSyCSx1-GNc4550A92TUA1KAqrcRsei-qxYI",
    authDomain: "super-message-f330f.firebaseapp.com",
    projectId: "super-message-f330f",
    storageBucket: "super-message-f330f.firebasestorage.app",
    messagingSenderId: "139149500957",
    appId: "1:139149500957:web:84205761f402288ce41cf4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;
  let currentChatId = null;
  let unsubMessages = null;
  let unsubChats = null;
  let allChats = [];

  // ── Global functions ──
  window.loginUser = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      errEl.textContent = 'メールアドレスかパスワードが違います';
      errEl.style.display = 'block';
    }
  };

  window.signupUser = async () => {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    errEl.style.display = 'none';
    if (!name) { errEl.textContent = '表示名を入力してください'; errEl.style.display='block'; return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        uid: cred.user.uid, displayName: name, email, createdAt: serverTimestamp()
      });
    } catch(e) {
      errEl.textContent = e.code === 'auth/email-already-in-use' ? 'このメールは使用済みです' : 'エラーが発生しました';
      errEl.style.display = 'block';
    }
  };

  window.logoutUser = async () => {
    await signOut(auth);
  };

  window.showSignup = () => {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('signup-card').style.display = 'flex';
    document.getElementById('signup-card').style.flexDirection = 'column';
  };
  window.showLogin = () => {
    document.getElementById('signup-card').style.display = 'none';
    document.getElementById('login-card').style.display = 'flex';
    document.getElementById('login-card').style.flexDirection = 'column';
  };

  // ── Auth state ──
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      const initials = (user.displayName || user.email).substring(0,2).toUpperCase();
      document.getElementById('me-avatar').textContent = initials;
      document.getElementById('me-name-label').textContent = user.displayName || user.email;
      listenChats();
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').classList.remove('visible');
      document.getElementById('chat-list').innerHTML = '';
      if (unsubChats) unsubChats();
    }
  });

  // ── Listen chats ──
  function listenChats() {
    if (unsubChats) unsubChats();
    const q = query(collection(db, 'chats'), where('members', 'array-contains', currentUser.uid));
    unsubChats = onSnapshot(q, snap => {
      allChats = [];
      snap.forEach(d => allChats.push({ id: d.id, ...d.data() }));
      allChats.sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0));
      renderChatList(allChats);
    });
  }

  function renderChatList(chats) {
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    if (chats.length === 0) {
      list.innerHTML = '<p style="font-size:12px;color:var(--text3);padding:16px;text-align:center">チャットがありません<br>右上のボタンで作成しよう</p>';
      return;
    }
    chats.forEach(chat => {
      const isGroup = chat.type === 'group';
      const name = isGroup ? chat.name : (chat.memberNames?.find(n => n !== (currentUser.displayName||currentUser.email)) || '不明');
      const initials = name.substring(0,2).toUpperCase();
      const colors = ['#3a2e1e','#1e2e3a','#2e1e3a','#1e3a2e','#3a1e2e'];
      const colorIdx = name.charCodeAt(0) % colors.length;
      const div = document.createElement('div');
      div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      div.dataset.id = chat.id;
      div.innerHTML = `
        <div class="avatar" style="background:${colors[colorIdx]};color:var(--accent)">${initials}</div>
        <div class="chat-meta">
          <div class="chat-name">${escHtml(name)}</div>
          <div class="chat-preview">${escHtml(chat.lastMessage || 'メッセージなし')}</div>
        </div>
      `;
      div.onclick = () => openChat(chat.id, name, initials, colors[colorIdx], isGroup);
      list.appendChild(div);
    });
  }

  window.filterChats = (q) => {
    const filtered = allChats.filter(c => {
      const name = c.type === 'group' ? c.name : (c.memberNames?.find(n => n !== (currentUser.displayName||currentUser.email)) || '');
      return name.toLowerCase().includes(q.toLowerCase());
    });
    renderChatList(filtered);
  };

  // ── Open chat ──
  function openChat(chatId, name, initials, color, isGroup) {
    currentChatId = chatId;
    document.querySelectorAll('.chat-item').forEach(el => el.classList.toggle('active', el.dataset.id === chatId));
    document.getElementById('empty-state').style.display = 'none';
    const cv = document.getElementById('chat-view');
    cv.style.display = 'flex';
    cv.style.flexDirection = 'column';
    document.getElementById('chat-avatar').textContent = initials;
    document.getElementById('chat-avatar').style.background = color;
    document.getElementById('chat-avatar').style.color = 'var(--accent)';
    document.getElementById('chat-name-header').textContent = name;
    document.getElementById('chat-status-header').textContent = isGroup ? 'グループチャット' : 'ダイレクトメッセージ';
    if (unsubMessages) unsubMessages();
    const q2 = query(collection(db,'chats',chatId,'messages'), orderBy('createdAt','asc'), limit(200));
    unsubMessages = onSnapshot(q2, snap => renderMessages(snap));
  }

  function renderMessages(snap) {
    const container = document.getElementById('messages-container');
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    container.innerHTML = '';
    let lastDate = '';
    let lastUid = '';
    snap.forEach(d => {
      const msg = d.data();
      const ts = msg.createdAt?.toDate();
      const dateStr = ts ? ts.toLocaleDateString('ja-JP') : '';
      if (dateStr && dateStr !== lastDate) {
        lastDate = dateStr;
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${dateStr}</span>`;
        container.appendChild(div);
        lastUid = '';
      }
      const isSelf = msg.uid === currentUser.uid;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isSelf ? 'self' : '');
      const avatarHtml = isSelf ? '' : `<div class="msg-avatar" style="background:#3a2e1e;color:var(--accent)">${(msg.displayName||'?').substring(0,2).toUpperCase()}</div>`;
      const senderHtml = (!isSelf && lastUid !== msg.uid) ? `<div class="msg-sender">${escHtml(msg.displayName||'')}</div>` : '';
      const timeStr = ts ? ts.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '';
      let contentHtml = '';
      if (msg.type === 'image') {
        contentHtml = `<div class="msg-img-bubble"><img src="${msg.imageUrl}" alt="画像" loading="lazy"/></div>`;
      } else {
        contentHtml = `<div class="msg-bubble ${isSelf?'self':'other'}">${escHtml(msg.text)}</div>`;
      }
      row.innerHTML = avatarHtml + `<div style="display:flex;flex-direction:column;${isSelf?'align-items:flex-end':''}">
        ${senderHtml}${contentHtml}
        <div class="msg-time-row">${timeStr}</div>
      </div>`;
      container.appendChild(row);
      lastUid = msg.uid;
    });
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  // ── Send message ──
  window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    input.value = '';
    autoResize(input);
    await addDoc(collection(db,'chats',currentChatId,'messages'), {
      text, uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email,
      type: 'text', createdAt: serverTimestamp()
    });
    await updateDoc(doc(db,'chats',currentChatId), {
      lastMessage: text, updatedAt: serverTimestamp()
    });
  };

  window.handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  window.autoResize = (el) => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  // ── Send image ──
  window.sendImage = async (input) => {
    const file = input.files[0];
    if (!file || !currentChatId) return;
    showToast('画像をアップロード中…');
    const storageRef = ref(storage, `images/${currentChatId}/${Date.now()}_${file.name}`);
    const snap = await uploadBytes(storageRef, file);
    const url = await getDownloadURL(snap.ref);
    await addDoc(collection(db,'chats',currentChatId,'messages'), {
      uid: currentUser.uid, displayName: currentUser.displayName || currentUser.email,
      type: 'image', imageUrl: url, createdAt: serverTimestamp()
    });
    await updateDoc(doc(db,'chats',currentChatId), {
      lastMessage: '📷 画像', updatedAt: serverTimestamp()
    });
    input.value = '';
    showToast('送信しました');
  };

  // ── Group ──
  window.openGroupModal = () => document.getElementById('group-modal').classList.add('open');
  window.closeGroupModal = () => document.getElementById('group-modal').classList.remove('open');

  window.createGroup = async () => {
    const name = document.getElementById('group-name-input').value.trim();
    const emailsRaw = document.getElementById('group-emails-input').value.trim();
    if (!name) { showToast('グループ名を入力してください'); return; }
    const emails = emailsRaw.split(',').map(e => e.trim()).filter(Boolean);
    const memberUids = [currentUser.uid];
    const memberNames = [currentUser.displayName || currentUser.email];
    for (const email of emails) {
      const q2 = query(collection(db,'users'), where('email','==',email), limit(1));
      const snap = await getDocs(q2);
      if (!snap.empty) {
        const u = snap.docs[0].data();
        memberUids.push(u.uid);
        memberNames.push(u.displayName || u.email);
      }
    }
    await addDoc(collection(db,'chats'), {
      type: 'group', name, members: memberUids, memberNames,
      createdBy: currentUser.uid, lastMessage: '', updatedAt: serverTimestamp()
    });
    closeGroupModal();
    document.getElementById('group-name-input').value = '';
    document.getElementById('group-emails-input').value = '';
    showToast('グループを作成しました');
  };

  // ── DM ──
  window.openDMModal = () => document.getElementById('dm-modal').classList.add('open');
  window.closeDMModal = () => document.getElementById('dm-modal').classList.remove('open');

  window.openDM = async () => {
    const email = document.getElementById('dm-email-input').value.trim();
    if (!email) return;
    const q2 = query(collection(db,'users'), where('email','==',email), limit(1));
    const snap = await getDocs(q2);
    if (snap.empty) { showToast('ユーザーが見つかりません'); return; }
    const other = snap.docs[0].data();
    const ids = [currentUser.uid, other.uid].sort();
    const dmId = 'dm_' + ids.join('_');
    const ref2 = doc(db,'chats',dmId);
    const existing = await getDoc(ref2);
    if (!existing.exists()) {
      await setDoc(ref2, {
        type: 'dm', members: ids,
        memberNames: [currentUser.displayName||currentUser.email, other.displayName||other.email],
        lastMessage: '', updatedAt: serverTimestamp()
      });
    }
    closeDMModal();
    document.getElementById('dm-email-input').value = '';
    const otherName = other.displayName || other.email;
    openChat(dmId, otherName, otherName.substring(0,2).toUpperCase(), '#1e2e3a', false);
    showToast(otherName + 'とのチャットを開きました');
  };

  window.showMembers = () => showToast('メンバー機能は近日公開予定です');

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }
  window.showToast = showToast;

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

<!-- Service Worker registration -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
