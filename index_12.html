<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Chat D</title>
  <meta name="description" content="シンプルでおしゃれなメッセージアプリ" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --text:#f0ede8;--text2:#8a8680;--text3:#5a5754;
      --accent:#c8a97e;--accent-bg:rgba(200,169,126,0.1);
      --online:#4ade80;--radius:16px;--radius-sm:10px;
    }
    body.light {
      --bg:#f5f3ef;--bg2:#ebe8e2;--bg3:#dedad4;
      --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
      --text:#1a1714;--text2:#6b6560;--text3:#9a9490;
      --accent:#a07850;--accent-bg:rgba(160,120,80,0.1);
    }
    html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;}

    /* Auth */
    #auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:32px;}
    .auth-logo{font-size:28px;font-weight:600;}
    .auth-logo span{color:var(--accent);}
    .auth-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:32px;width:340px;display:flex;flex-direction:column;gap:16px;}
    .auth-card h2{font-size:17px;font-weight:500;}
    .auth-card p{font-size:13px;color:var(--text2);line-height:1.6;}
    .auth-input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;width:100%;transition:border-color 0.15s;}
    .auth-input:focus{border-color:var(--accent);}
    .btn-primary{background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
    .btn-primary:hover{opacity:0.9;}
    .btn-secondary{background:transparent;color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px;font-size:14px;cursor:pointer;font-family:inherit;}
    .auth-divider{display:flex;align-items:center;gap:10px;}
    .auth-divider span{font-size:12px;color:var(--text3);}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:0.5px;background:var(--border);}
    .auth-error{font-size:12px;color:#f87171;display:none;}

    /* App */
    #app{display:none;height:100vh;flex-direction:row;}
    #app.visible{display:flex;}

    /* Sidebar */
    .sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;}
    .sidebar-top{padding:18px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
    .sidebar-top .logo{font-size:18px;font-weight:600;}
    .sidebar-top .logo span{color:var(--accent);}
    .icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background 0.12s,color 0.12s;}
    .icon-btn:hover{background:var(--bg3);color:var(--text);}
    .sidebar-search{margin:10px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;gap:8px;}
    .sidebar-search input{background:none;border:none;font-size:13px;color:var(--text);outline:none;flex:1;font-family:inherit;}
    .sidebar-search input::placeholder{color:var(--text3);}
    .chat-list{flex:1;overflow-y:auto;padding-bottom:8px;}
    .chat-list::-webkit-scrollbar{width:3px;}
    .chat-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
    .chat-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background 0.12s;border-radius:var(--radius-sm);margin:0 6px 1px;}
    .chat-item:hover{background:var(--bg3);}
    .chat-item.active{background:var(--accent-bg);}
    .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .chat-meta{flex:1;min-width:0;}
    .chat-name{font-size:13px;font-weight:500;}
    .chat-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .sidebar-footer{padding:12px 16px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
    .me-name{flex:1;font-size:13px;font-weight:500;}
    .me-status-text{font-size:11px;color:var(--text2);}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .chat-header{padding:14px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .chat-header-info{flex:1;}
    .chat-header-name{font-size:15px;font-weight:600;}
    .chat-header-status{font-size:12px;color:var(--text2);margin-top:1px;}
    .header-actions{display:flex;gap:4px;}

    /* Search bar */
    .search-bar{padding:8px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);display:none;gap:8px;align-items:center;}
    .search-bar.visible{display:flex;}
    .search-bar input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;color:var(--text);outline:none;font-family:inherit;}

    /* Pin */
    .pin-banner{background:var(--accent-bg);border-bottom:0.5px solid var(--border);padding:8px 16px;font-size:12px;color:var(--accent);display:none;cursor:pointer;align-items:center;gap:8px;}
    .pin-banner.visible{display:flex;}

    /* Messages */
    .messages{flex:1;overflow-y:auto;padding:20px 20px 8px;display:flex;flex-direction:column;gap:4px;}
    .messages::-webkit-scrollbar{width:3px;}
    .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
    .day-divider{text-align:center;font-size:11px;color:var(--text3);margin:12px 0;position:relative;}
    .day-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:var(--border);}
    .day-divider span{background:var(--bg);padding:0 12px;position:relative;}
    .msg-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:2px;}
    .msg-row.self{flex-direction:row-reverse;}
    .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .msg-bubble{max-width:65%;min-width:120px;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word;}
    .msg-bubble.other{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;}
    .msg-bubble.self{background:var(--accent);color:#0f0f0f;border-bottom-right-radius:4px;}
    .msg-bubble.highlight{outline:2px solid var(--accent);}
    .msg-sender{font-size:11px;color:var(--text3);margin-bottom:3px;padding-left:36px;}
    .msg-time-row{display:flex;font-size:11px;color:var(--text3);padding:2px 4px 0;gap:8px;}
    .msg-row.self .msg-time-row{justify-content:flex-end;}
    .msg-img-bubble{max-width:240px;border-radius:14px;overflow:hidden;border:0.5px solid var(--border);cursor:pointer;}
    .msg-img-bubble img{width:100%;display:block;}
    .stamp-msg{font-size:40px;line-height:1;}
    .msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
    .reaction-chip{background:var(--bg3);border:0.5px solid var(--border2);border-radius:12px;padding:2px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;}
    .reaction-chip.mine{background:var(--accent-bg);border-color:var(--accent);}
    .reaction-chip span{font-size:11px;color:var(--text2);}
    .reaction-picker{position:fixed;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;display:none;gap:6px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
    .reaction-picker button{background:none;border:none;font-size:20px;cursor:pointer;border-radius:6px;padding:2px 4px;}
    .reply-preview{background:var(--bg3);border-left:2px solid var(--accent);padding:6px 10px;margin-bottom:4px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;}
    .reply-preview strong{color:var(--accent);font-size:11px;display:block;}
    .reply-cancel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}
    .msg-reply-ref{background:rgba(255,255,255,0.05);border-left:2px solid var(--accent);padding:4px 8px;border-radius:0 6px 6px 0;font-size:11px;color:var(--text2);margin-bottom:4px;}
    .msg-reply-ref strong{color:var(--accent);display:block;font-size:10px;}
    .read-receipt{font-size:10px;color:var(--text3);margin-top:2px;text-align:right;}
    .read-receipt.seen{color:var(--accent);}

    /* Input */
    .input-area{padding:8px 16px 14px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0;position:relative;}
    .input-row{display:flex;align-items:flex-end;gap:8px;}
    .input-attach{display:flex;gap:2px;flex-shrink:0;}
    .input-wrap{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:22px;display:flex;align-items:flex-end;padding:8px 12px;gap:8px;transition:border-color 0.15s;}
    .input-wrap:focus-within{border-color:var(--accent);}
    #msg-input{flex:1;background:none;border:none;font-size:14px;color:var(--text);outline:none;resize:none;font-family:inherit;line-height:1.5;max-height:120px;overflow-y:auto;}
    #msg-input::placeholder{color:var(--text3);}
    .send-btn{background:var(--accent);border:none;color:#0f0f0f;width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 0.12s,transform 0.1s;}
    .send-btn:hover{opacity:0.9;}
    .send-btn:active{transform:scale(0.92);}
    .stamp-picker{position:absolute;bottom:70px;left:16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
    .stamp-picker.open{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
    .stamp-btn{background:none;border:none;font-size:28px;cursor:pointer;border-radius:8px;padding:4px;}
    .stamp-btn:hover{background:var(--bg3);}

    /* Modals */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:100;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:24px;width:360px;display:flex;flex-direction:column;gap:14px;}
    .modal h3{font-size:16px;font-weight:600;}
    .modal-input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 13px;font-size:14px;color:var(--text);font-family:inherit;outline:none;width:100%;}
    .modal-input:focus{border-color:var(--accent);}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
    .btn-cancel{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
    .btn-create{background:var(--accent);border:none;border-radius:var(--radius-sm);padding:8px 16px;color:#0f0f0f;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
    .member-tag{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);border:0.5px solid var(--accent);border-radius:12px;padding:3px 10px;font-size:12px;color:var(--accent);margin:2px;}
    .member-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0;}
    .member-tags{display:flex;flex-wrap:wrap;min-height:32px;padding:4px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);}
    .member-tags input{background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit;flex:1;min-width:120px;padding:4px;}
    .member-tags input::placeholder{color:var(--text3);}
    .profile-avatar-large{width:80px;height:80px;border-radius:50%;background:#3a2e1e;color:var(--accent);font-size:28px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:2px solid var(--border2);margin:0 auto;}
    .profile-avatar-large img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

    /* Empty */
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);}
    .empty-state svg{opacity:0.3;}
    .empty-state p{font-size:14px;}
    #file-input,#avatar-file-input{display:none;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;color:var(--text);z-index:200;transition:transform 0.25s ease;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-logo">Super Chat<span> D</span></div>
  <div class="auth-card" id="login-card">
    <h2>ログイン</h2>
    <p>メールアドレスとパスワードを入力してください</p>
    <input class="auth-input" id="login-email" type="email" placeholder="メールアドレス" />
    <input class="auth-input" id="login-password" type="password" placeholder="パスワード" />
    <span class="auth-error" id="login-error"></span>
    <button class="btn-primary" onclick="loginUser()">ログイン</button>
    <div class="auth-divider"><span>または</span></div>
    <button class="btn-secondary" onclick="showSignup()">新規アカウント作成</button>
  </div>
  <div class="auth-card" id="signup-card" style="display:none">
    <h2>アカウント作成</h2>
    <input class="auth-input" id="signup-name" type="text" placeholder="表示名" />
    <input class="auth-input" id="signup-email" type="email" placeholder="メールアドレス" />
    <input class="auth-input" id="signup-password" type="password" placeholder="パスワード（6文字以上）" />
    <span class="auth-error" id="signup-error"></span>
    <button class="btn-primary" onclick="signupUser()">作成する</button>
    <button class="btn-secondary" onclick="showLogin()">ログインに戻る</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="logo">Super Chat<span> D</span></div>
      <div style="display:flex;gap:4px">
        <button class="icon-btn" title="グループ作成" onclick="openGroupModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="icon-btn" title="DM" onclick="openDMModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="sidebar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="検索…" id="search-input" oninput="filterChats(this.value)" />
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <div class="avatar" id="me-avatar" style="background:#3a2e1e;color:var(--accent);width:34px;height:34px;font-size:12px;cursor:pointer" onclick="openProfileModal()"></div>
      <div style="flex:1">
        <div class="me-name" id="me-name-label">—</div>
        <div class="me-status-text" id="me-status-label">オンライン</div>
      </div>
      <button class="icon-btn" title="ライト/ダーク" onclick="toggleTheme()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      </button>
      <button class="icon-btn" title="ログアウト" onclick="logoutUser()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="main" id="main-area">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>チャットを選択してください</p>
    </div>
    <div id="chat-view" style="display:none;flex:1;flex-direction:column;min-height:0">
      <div class="chat-header">
        <div class="avatar" id="chat-avatar" style="width:36px;height:36px;font-size:13px"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name-header"></div>
          <div class="chat-header-status" id="chat-status-header"></div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="検索" onclick="toggleSearchBar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>
      <div class="pin-banner" id="pin-banner" onclick="scrollToPin()">📌 <span id="pin-text"></span></div>
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input-msg" placeholder="メッセージを検索…" oninput="searchMessages(this.value)" />
        <button class="icon-btn" onclick="toggleSearchBar()">✕</button>
      </div>
      <div class="messages" id="messages-container"></div>
      <div class="input-area">
        <div id="reply-preview" style="display:none" class="reply-preview">
          <div><strong id="reply-name"></strong><span id="reply-text-preview"></span></div>
          <button class="reply-cancel" onclick="cancelReply()">×</button>
        </div>
        <div class="input-row">
          <div class="stamp-picker" id="stamp-picker">
            <button class="stamp-btn" onclick="sendStamp('😂')">😂</button>
            <button class="stamp-btn" onclick="sendStamp('❤️')">❤️</button>
            <button class="stamp-btn" onclick="sendStamp('👍')">👍</button>
            <button class="stamp-btn" onclick="sendStamp('🔥')">🔥</button>
            <button class="stamp-btn" onclick="sendStamp('😮')">😮</button>
            <button class="stamp-btn" onclick="sendStamp('😭')">😭</button>
            <button class="stamp-btn" onclick="sendStamp('🎉')">🎉</button>
            <button class="stamp-btn" onclick="sendStamp('💀')">💀</button>
            <button class="stamp-btn" onclick="sendStamp('🤣')">🤣</button>
            <button class="stamp-btn" onclick="sendStamp('😎')">😎</button>
          </div>
          <div class="input-attach">
            <button class="icon-btn" title="スタンプ" onclick="toggleStampPicker()">😊</button>
            <button class="icon-btn" title="画像" onclick="document.getElementById('file-input').click()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
          </div>
          <div class="input-wrap">
            <textarea id="msg-input" rows="1" placeholder="メッセージを入力…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="sendImage(this)" />
    </div>
  </div>
</div>

<!-- Reaction Picker -->
<div id="reaction-picker" class="reaction-picker">
  <button onclick="addReaction('❤️')">❤️</button>
  <button onclick="addReaction('👍')">👍</button>
  <button onclick="addReaction('😂')">😂</button>
  <button onclick="addReaction('😮')">😮</button>
  <button onclick="addReaction('😢')">😢</button>
  <button onclick="addReaction('🔥')">🔥</button>
</div>

<!-- Group Modal -->
<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3>グループを作成</h3>
    <input class="modal-input" id="group-name-input" placeholder="グループ名" />
    <p style="font-size:12px;color:var(--text2)">名前またはメールを入力してEnterで追加</p>
    <div class="member-tags" id="member-tags-container">
      <input type="text" id="member-email-input" placeholder="名前またはメールアドレス…" onkeydown="handleMemberInput(event)" />
    </div>
    <div id="member-list" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeGroupModal()">キャンセル</button>
      <button class="btn-create" onclick="createGroup()">作成</button>
    </div>
  </div>
</div>

<!-- DM Modal -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <h3>ダイレクトメッセージ</h3>
    <p style="font-size:13px;color:var(--text2)">相手の名前またはメールを入力</p>
    <input class="modal-input" id="dm-input" placeholder="名前またはメールアドレス" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDMModal()">キャンセル</button>
      <button class="btn-create" onclick="openDM()">開く</button>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <h3>プロフィール</h3>
    <div class="profile-avatar-large" id="profile-avatar-preview" onclick="document.getElementById('avatar-file-input').click()"></div>
    <p style="font-size:11px;color:var(--text3);text-align:center">タップして画像を変更</p>
    <input class="modal-input" id="profile-name-input" placeholder="表示名" />
    <input class="modal-input" id="profile-status-input" placeholder="ステータス（例：今日は暇！）" />
    <input type="file" id="avatar-file-input" accept="image/*" onchange="uploadAvatar(this)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProfileModal()">キャンセル</button>
      <button class="btn-create" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, where, limit }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSx1-GNc4550A92TUA1KAqrcRsei-qxYI",
    authDomain: "super-message-f330f.firebaseapp.com",
    projectId: "super-message-f330f",
    storageBucket: "super-message-f330f.firebasestorage.app",
    messagingSenderId: "139149500957",
    appId: "1:139149500957:web:84205761f402288ce41cf4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;
  let currentChatId = null;
  let unsubMessages = null;
  let unsubChats = null;
  let allChats = [];
  let replyTo = null;
  let reactionMsgId = null;
  let groupMembers = [];
  let pinnedMsgId = null;
  let lastMsgCount = 0;

  // ── Auth ──
  window.loginUser = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { errEl.textContent = 'メールアドレスかパスワードが違います'; errEl.style.display = 'block'; }
  };

  window.signupUser = async () => {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    errEl.style.display = 'none';
    if (!name) { errEl.textContent = '表示名を入力してください'; errEl.style.display='block'; return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db,'users',cred.user.uid), { uid: cred.user.uid, displayName: name, email, photoURL: '', status: '', createdAt: serverTimestamp() });
    } catch(e) {
      errEl.textContent = e.code === 'auth/email-already-in-use' ? 'このメールは使用済みです' : 'エラーが発生しました';
      errEl.style.display = 'block';
    }
  };

  window.logoutUser = async () => { await signOut(auth); };
  window.showSignup = () => { document.getElementById('login-card').style.display='none'; document.getElementById('signup-card').style.cssText='display:flex;flex-direction:column;gap:16px;'; };
  window.showLogin = () => { document.getElementById('signup-card').style.display='none'; document.getElementById('login-card').style.cssText='display:flex;flex-direction:column;gap:16px;'; };

  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      setMeAvatar(user);
      document.getElementById('me-name-label').textContent = user.displayName || user.email;
      // Load status
      try {
        const ud = await getDoc(doc(db,'users',user.uid));
        const st = ud.data()?.status;
        if (st) document.getElementById('me-status-label').textContent = st;
      } catch(e) {}
      listenChats();
      requestNotificationPermission();
      // Save theme
      if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').classList.remove('visible');
      if (unsubChats) unsubChats();
    }
  });

  function setMeAvatar(user) {
    const el = document.getElementById('me-avatar');
    if (user.photoURL) {
      el.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      el.textContent = (user.displayName || user.email).substring(0,2).toUpperCase();
    }
  }

  // ── Theme ──
  window.toggleTheme = () => {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  };

  // ── Notifications ──
  async function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  }
  function sendNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted' && document.hidden) {
      new Notification(title, { body, icon: '/icon.svg' });
    }
  }

  // ── Profile ──
  window.openProfileModal = () => {
    const prev = document.getElementById('profile-avatar-preview');
    if (currentUser.photoURL) {
      prev.innerHTML = `<img src="${currentUser.photoURL}">`;
    } else {
      prev.textContent = (currentUser.displayName||'').substring(0,2).toUpperCase();
    }
    document.getElementById('profile-name-input').value = currentUser.displayName || '';
    getDoc(doc(db,'users',currentUser.uid)).then(d => {
      document.getElementById('profile-status-input').value = d.data()?.status || '';
    });
    document.getElementById('profile-modal').classList.add('open');
  };
  window.closeProfileModal = () => document.getElementById('profile-modal').classList.remove('open');

  window.uploadAvatar = async (input) => {
    const file = input.files[0]; if (!file) return;
    showToast('アップロード中…');
    try {
      const r = ref(storage, `avatars/${currentUser.uid}`);
      const snap = await uploadBytes(r, file);
      const url = await getDownloadURL(snap.ref);
      const prev = document.getElementById('profile-avatar-preview');
      prev.innerHTML = `<img src="${url}">`;
      prev.dataset.url = url;
    } catch(e) { showToast('画像のアップロードに失敗しました'); }
  };

  window.saveProfile = async () => {
    const name = document.getElementById('profile-name-input').value.trim();
    const status = document.getElementById('profile-status-input').value.trim();
    const url = document.getElementById('profile-avatar-preview').dataset.url || currentUser.photoURL || '';
    if (!name) { showToast('名前を入力してください'); return; }
    await updateProfile(currentUser, { displayName: name, photoURL: url });
    await updateDoc(doc(db,'users',currentUser.uid), { displayName: name, photoURL: url, status });
    setMeAvatar(currentUser);
    document.getElementById('me-name-label').textContent = name;
    document.getElementById('me-status-label').textContent = status || 'オンライン';
    closeProfileModal();
    showToast('プロフィールを更新しました');
  };

  // ── Chats ──
  function listenChats() {
    if (unsubChats) unsubChats();
    const q = query(collection(db,'chats'), where('members','array-contains',currentUser.uid));
    unsubChats = onSnapshot(q, snap => {
      allChats = [];
      snap.forEach(d => allChats.push({ id: d.id, ...d.data() }));
      allChats.sort((a,b) => (b.updatedAt?.seconds||0) - (a.updatedAt?.seconds||0));
      renderChatList(allChats);
    });
  }

  function getChatDisplayName(chat) {
    if (chat.type === 'group') return chat.name;
    const myUid = currentUser.uid;
    const myIdx = chat.members?.indexOf(myUid);
    // Get the other person's index
    const otherIdx = myIdx === 0 ? 1 : 0;
    return chat.memberNames?.[otherIdx] || '不明';
  }

  function renderChatList(chats) {
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    if (!chats.length) { list.innerHTML = '<p style="font-size:12px;color:var(--text3);padding:16px;text-align:center">チャットがありません</p>'; return; }
    chats.forEach(chat => {
      const name = getChatDisplayName(chat);
      const initials = name.substring(0,2).toUpperCase();
      const colors = ['#3a2e1e','#1e2e3a','#2e1e3a','#1e3a2e','#3a1e2e'];
      const bg = colors[name.charCodeAt(0) % colors.length];
      const div = document.createElement('div');
      div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      div.dataset.id = chat.id;
      div.innerHTML = `
        <div class="avatar" style="background:${bg};color:var(--accent)">${initials}</div>
        <div class="chat-meta">
          <div class="chat-name">${escHtml(name)}</div>
          <div class="chat-preview">${escHtml(chat.lastMessage || 'メッセージなし')}</div>
        </div>`;
      div.onclick = () => openChat(chat.id, name, initials, bg, chat.type === 'group');
      list.appendChild(div);
    });
  }

  window.filterChats = q => renderChatList(allChats.filter(c => {
    const name = getChatDisplayName(c);
    return name.toLowerCase().includes(q.toLowerCase());
  }));

  function openChat(chatId, name, initials, color, isGroup) {
    currentChatId = chatId;
    lastMsgCount = 0;
    document.querySelectorAll('.chat-item').forEach(el => el.classList.toggle('active', el.dataset.id === chatId));
    document.getElementById('empty-state').style.display = 'none';
    const cv = document.getElementById('chat-view');
    cv.style.display = 'flex';
    cv.style.flexDirection = 'column';
    document.getElementById('chat-avatar').textContent = initials;
    document.getElementById('chat-avatar').style.background = color;
    document.getElementById('chat-avatar').style.color = 'var(--accent)';
    document.getElementById('chat-name-header').textContent = name;
    document.getElementById('chat-status-header').textContent = isGroup ? 'グループチャット' : 'ダイレクトメッセージ';
    cancelReply();
    if (unsubMessages) unsubMessages();
    const q2 = query(collection(db,'chats',chatId,'messages'), orderBy('createdAt','asc'), limit(200));
    unsubMessages = onSnapshot(q2, snap => { renderMessages(snap, isGroup); checkNewMessages(snap); });
    // Listen for pin
    onSnapshot(doc(db,'chats',chatId), d => {
      const pin = d.data()?.pinnedMsg;
      const banner = document.getElementById('pin-banner');
      if (pin) { pinnedMsgId = pin.id; document.getElementById('pin-text').textContent = pin.text; banner.classList.add('visible'); }
      else { banner.classList.remove('visible'); pinnedMsgId = null; }
    });
    markAsRead(chatId);
  }

  function renderMessages(snap, isGroup) {
    const container = document.getElementById('messages-container');
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
    container.innerHTML = '';
    let lastDate = '', lastUid = '';
    snap.forEach(d => {
      const msg = d.data(); const msgId = d.id;
      const ts = msg.createdAt?.toDate();
      const dateStr = ts ? ts.toLocaleDateString('ja-JP') : '';
      if (dateStr && dateStr !== lastDate) {
        lastDate = dateStr;
        const div = document.createElement('div');
        div.className = 'day-divider';
        div.innerHTML = `<span>${dateStr}</span>`;
        container.appendChild(div);
        lastUid = '';
      }
      const isSelf = msg.uid === currentUser.uid;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isSelf ? 'self' : '');
      const timeStr = ts ? ts.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) : '';

      // Avatar
      let avatarHtml = '';
      if (!isSelf) {
        const photoURL = msg.photoURL || '';
        avatarHtml = photoURL
          ? `<div class="msg-avatar"><img src="${photoURL}" alt="av"></div>`
          : `<div class="msg-avatar" style="background:#3a2e1e;color:var(--accent)">${(msg.displayName||'?').substring(0,2).toUpperCase()}</div>`;
      }

      const senderHtml = (!isSelf && lastUid !== msg.uid) ? `<div class="msg-sender">${escHtml(msg.displayName||'')}</div>` : '';

      let replyHtml = '';
      if (msg.replyTo) {
        replyHtml = `<div class="msg-reply-ref"><strong>${escHtml(msg.replyTo.displayName)}</strong>${escHtml((msg.replyTo.text||'').substring(0,50))}</div>`;
      }

      let contentHtml = '';
      if (msg.type === 'image') {
        contentHtml = `<div class="msg-img-bubble"><img src="${msg.imageUrl}" alt="画像" loading="lazy"/></div>`;
      } else if (msg.type === 'stamp') {
        contentHtml = `<div class="stamp-msg">${escHtml(msg.text)}</div>`;
      } else {
        contentHtml = `<div class="msg-bubble ${isSelf?'self':'other'}" id="msg-${msgId}">${escHtml(msg.text)}</div>`;
      }

      // Reactions
      const reactions = msg.reactions || {};
      let reactionsHtml = '';
      if (Object.keys(reactions).length > 0) {
        const counts = {};
        Object.values(reactions).forEach(emoji => { counts[emoji] = (counts[emoji]||0)+1; });
        const myReaction = reactions[currentUser.uid];
        reactionsHtml = '<div class="msg-reactions">' +
          Object.entries(counts).map(([emoji, count]) =>
            `<div class="reaction-chip ${myReaction===emoji?'mine':''}" onclick="toggleReaction('${msgId}','${emoji}')">${emoji} <span>${count}</span></div>`
          ).join('') + '</div>';
      }

      // Read receipt
      let readHtml = '';
      if (isSelf) {
        const readBy = msg.readBy || {};
        const readers = Object.entries(readBy).filter(([uid]) => uid !== currentUser.uid);
        if (readers.length > 0) {
          readHtml = isGroup
            ? `<div class="read-receipt seen" style="cursor:pointer" onclick="showReadUsers(event,'${msgId}')">既読 ${readers.length}</div>`
            : `<div class="read-receipt seen">既読</div>`;
        }
      }

      row.innerHTML = avatarHtml + `<div style="display:flex;flex-direction:column;${isSelf?'align-items:flex-end':''}">
        ${senderHtml}${replyHtml}${contentHtml}${reactionsHtml}
        <div class="msg-time-row">
          <span>${timeStr}</span>
          <span style="cursor:pointer;font-size:13px" onclick="showReactionPicker(event,'${msgId}')">😊</span>
          <span style="cursor:pointer;font-size:11px;color:var(--accent)" onclick="setReply('${msgId}','${escHtml(msg.displayName||'')}','${escHtml((msg.text||'').replace(/'/g,"\\'").substring(0,50))}')">返信</span>
          <span style="cursor:pointer;font-size:11px;color:var(--text3)" onclick="pinMessage('${msgId}','${escHtml((msg.text||'スタンプ').substring(0,30))}')">📌</span>
        </div>
        ${readHtml}
      </div>`;
      container.appendChild(row);
      lastUid = msg.uid;
    });
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  function checkNewMessages(snap) {
    const msgs = snap.docs;
    if (lastMsgCount > 0 && msgs.length > lastMsgCount) {
      const latest = msgs[msgs.length-1].data();
      if (latest.uid !== currentUser.uid) {
        sendNotification('Super Chat D', (latest.displayName||'誰か') + ': ' + (latest.text || '📷'));
      }
    }
    lastMsgCount = msgs.length;
  }

  // ── Read receipts ──
  async function markAsRead(chatId) {
    if (!currentUser || !chatId) return;
    try {
      const q2 = query(collection(db,'chats',chatId,'messages'), orderBy('createdAt','asc'), limit(200));
      const snap = await getDocs(q2);
      const promises = [];
      snap.forEach(d => {
        const msg = d.data();
        if (msg.uid !== currentUser.uid && !(msg.readBy && msg.readBy[currentUser.uid])) {
          promises.push(updateDoc(doc(db,'chats',chatId,'messages',d.id), {
            [`readBy.${currentUser.uid}`]: currentUser.displayName || currentUser.email
          }));
        }
      });
      await Promise.all(promises);
    } catch(e) {}
  }

  window.showReadUsers = async (e, msgId) => {
    e.stopPropagation();
    document.querySelectorAll('.read-users-popup').forEach(el => el.remove());
    const popup = document.createElement('div');
    popup.className = 'read-users-popup';
    popup.style.cssText = `position:fixed;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;z-index:50;font-size:12px;color:var(--text2);box-shadow:0 4px 16px rgba(0,0,0,0.4);`;
    popup.textContent = '読み込み中…';
    const rect = e.target.getBoundingClientRect();
    popup.style.top = (rect.top - 40) + 'px';
    popup.style.left = Math.max(0, rect.left - 80) + 'px';
    document.body.appendChild(popup);
    const d = await getDoc(doc(db,'chats',currentChatId,'messages',msgId));
    const readBy = d.data()?.readBy || {};
    const readers = Object.entries(readBy).filter(([uid]) => uid !== currentUser.uid);
    popup.textContent = readers.length > 0 ? readers.map(([,name]) => name).join('、') : '既読なし';
    setTimeout(() => popup.remove(), 3000);
  };

  // ── Reactions ──
  window.showReactionPicker = (e, msgId) => {
    e.stopPropagation();
    reactionMsgId = msgId;
    const picker = document.getElementById('reaction-picker');
    picker.style.display = 'flex';
    const rect = e.target.getBoundingClientRect();
    picker.style.top = (rect.top - 60) + 'px';
    picker.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
  };
  document.addEventListener('click', () => { document.getElementById('reaction-picker').style.display = 'none'; });

  window.addReaction = async (emoji) => {
    if (!reactionMsgId || !currentChatId) return;
    document.getElementById('reaction-picker').style.display = 'none';
    await updateDoc(doc(db,'chats',currentChatId,'messages',reactionMsgId), { [`reactions.${currentUser.uid}`]: emoji });
  };

  window.toggleReaction = async (msgId, emoji) => {
    const msgRef = doc(db,'chats',currentChatId,'messages',msgId);
    const snap = await getDoc(msgRef);
    const reactions = snap.data()?.reactions || {};
    if (reactions[currentUser.uid] === emoji) {
      const newR = {...reactions}; delete newR[currentUser.uid];
      await updateDoc(msgRef, { reactions: newR });
    } else {
      await updateDoc(msgRef, { [`reactions.${currentUser.uid}`]: emoji });
    }
  };

  // ── Reply ──
  window.setReply = (msgId, name, text) => {
    replyTo = { msgId, displayName: name, text };
    document.getElementById('reply-preview').style.display = 'flex';
    document.getElementById('reply-name').textContent = name + 'への返信';
    document.getElementById('reply-text-preview').textContent = text.substring(0,60);
    document.getElementById('msg-input').focus();
  };
  window.cancelReply = () => {
    replyTo = null;
    document.getElementById('reply-preview').style.display = 'none';
  };

  // ── Pin ──
  window.pinMessage = async (msgId, text) => {
    if (!currentChatId) return;
    await updateDoc(doc(db,'chats',currentChatId), { pinnedMsg: { id: msgId, text } });
    showToast('📌 ピン留めしました');
  };
  window.scrollToPin = () => {
    if (!pinnedMsgId) return;
    const el = document.getElementById('msg-' + pinnedMsgId);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('highlight'); setTimeout(() => el.classList.remove('highlight'), 2000); }
  };

  // ── Search ──
  window.toggleSearchBar = () => {
    const bar = document.getElementById('search-bar');
    bar.classList.toggle('visible');
    if (bar.classList.contains('visible')) document.getElementById('search-input-msg').focus();
    else { document.getElementById('search-input-msg').value = ''; searchMessages(''); }
  };
  window.searchMessages = (q) => {
    document.querySelectorAll('#messages-container .msg-row').forEach(row => {
      if (!q) { row.style.display = ''; return; }
      const text = row.textContent.toLowerCase();
      row.style.display = text.includes(q.toLowerCase()) ? '' : 'none';
    });
  };

  // ── Stamp ──
  window.toggleStampPicker = () => { document.getElementById('stamp-picker').classList.toggle('open'); };
  window.sendStamp = async (emoji) => {
    if (!currentChatId) return;
    document.getElementById('stamp-picker').classList.remove('open');
    await addDoc(collection(db,'chats',currentChatId,'messages'), {
      text: emoji, uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email,
      photoURL: currentUser.photoURL || '',
      type: 'stamp', createdAt: serverTimestamp(), reactions: {}
    });
    await updateDoc(doc(db,'chats',currentChatId), { lastMessage: emoji, updatedAt: serverTimestamp() });
  };

  // ── Send ──
  window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    input.value = '';
    autoResize(input);
    const msgData = {
      text, uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email,
      photoURL: currentUser.photoURL || '',
      type: 'text', createdAt: serverTimestamp(), reactions: {}
    };
    if (replyTo) { msgData.replyTo = replyTo; cancelReply(); }
    await addDoc(collection(db,'chats',currentChatId,'messages'), msgData);
    await updateDoc(doc(db,'chats',currentChatId), { lastMessage: text, updatedAt: serverTimestamp() });
  };

  window.handleKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
  window.autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

  window.sendImage = async (input) => {
    const file = input.files[0]; if (!file || !currentChatId) return;
    showToast('画像をアップロード中…');
    try {
      const r = ref(storage, `images/${currentChatId}/${Date.now()}_${file.name}`);
      const snap = await uploadBytes(r, file);
      const url = await getDownloadURL(snap.ref);
      await addDoc(collection(db,'chats',currentChatId,'messages'), {
        uid: currentUser.uid, displayName: currentUser.displayName||currentUser.email,
        photoURL: currentUser.photoURL||'', type: 'image', imageUrl: url,
        createdAt: serverTimestamp(), reactions: {}
      });
      await updateDoc(doc(db,'chats',currentChatId), { lastMessage: '📷 画像', updatedAt: serverTimestamp() });
    } catch(e) { showToast('画像の送信に失敗しました'); }
    input.value = '';
  };

  // ── Group ──
  window.openGroupModal = () => {
    groupMembers = [];
    document.getElementById('member-list').innerHTML = '';
    document.getElementById('group-name-input').value = '';
    document.getElementById('member-email-input').value = '';
    document.getElementById('group-modal').classList.add('open');
  };
  window.closeGroupModal = () => document.getElementById('group-modal').classList.remove('open');

  window.handleMemberInput = async (e) => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    if (!val) return;
    let found = null;
    const q2 = query(collection(db,'users'), where('email','==',val), limit(1));
    const snap = await getDocs(q2);
    if (!snap.empty) {
      found = snap.docs[0].data();
    } else {
      const q3 = query(collection(db,'users'), where('displayName','==',val), limit(1));
      const snap2 = await getDocs(q3);
      if (!snap2.empty) found = snap2.docs[0].data();
    }
    if (!found) { showToast('ユーザーが見つかりません'); return; }
    if (found.uid === currentUser.uid) { showToast('自分は追加不要です'); return; }
    if (groupMembers.find(m => m.uid === found.uid)) { showToast('すでに追加されています'); return; }
    groupMembers.push(found);
    e.target.value = '';
    renderMemberTags();
    showToast(found.displayName + 'を追加しました');
  };

  function renderMemberTags() {
    const list = document.getElementById('member-list');
    list.innerHTML = groupMembers.map((m,i) =>
      `<div class="member-tag">${escHtml(m.displayName||m.email)} <button onclick="removeMember(${i})">×</button></div>`
    ).join('');
  }
  window.removeMember = (i) => { groupMembers.splice(i,1); renderMemberTags(); };

  window.createGroup = async () => {
    const name = document.getElementById('group-name-input').value.trim();
    if (!name) { showToast('グループ名を入力してください'); return; }
    const memberUids = [currentUser.uid, ...groupMembers.map(m=>m.uid)];
    const memberNames = [currentUser.displayName||currentUser.email, ...groupMembers.map(m=>m.displayName||m.email)];
    await addDoc(collection(db,'chats'), {
      type: 'group', name, members: memberUids, memberNames,
      createdBy: currentUser.uid, lastMessage: '', updatedAt: serverTimestamp()
    });
    closeGroupModal();
    showToast('グループを作成しました');
  };

  // ── DM ──
  window.openDMModal = () => document.getElementById('dm-modal').classList.add('open');
  window.closeDMModal = () => document.getElementById('dm-modal').classList.remove('open');

  window.openDM = async () => {
    const val = document.getElementById('dm-input').value.trim();
    if (!val) return;
    let found = null;
    const q2 = query(collection(db,'users'), where('email','==',val), limit(1));
    const snap = await getDocs(q2);
    if (!snap.empty) {
      found = snap.docs[0].data();
    } else {
      const q3 = query(collection(db,'users'), where('displayName','==',val), limit(1));
      const snap2 = await getDocs(q3);
      if (!snap2.empty) found = snap2.docs[0].data();
    }
    if (!found) { showToast('ユーザーが見つかりません'); return; }
    // DM ID: sorted by uid so it's always the same
    const ids = [currentUser.uid, found.uid].sort();
    const dmId = 'dm_' + ids.join('_');
    const ref2 = doc(db,'chats',dmId);
    const existing = await getDoc(ref2);
    if (!existing.exists()) {
      // Store memberNames in order matching members array
      const members = ids;
      const memberNames = ids.map(uid => uid === currentUser.uid ? (currentUser.displayName||currentUser.email) : (found.displayName||found.email));
      await setDoc(ref2, { type: 'dm', members, memberNames, lastMessage: '', updatedAt: serverTimestamp() });
    }
    closeDMModal();
    document.getElementById('dm-input').value = '';
    const otherName = found.displayName || found.email;
    const colors = ['#3a2e1e','#1e2e3a','#2e1e3a','#1e3a2e','#3a1e2e'];
    openChat(dmId, otherName, otherName.substring(0,2).toUpperCase(), colors[otherName.charCodeAt(0)%colors.length], false);
  };

  // ── Utils ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }
  window.showToast = showToast;

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
